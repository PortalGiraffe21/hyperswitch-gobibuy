- name: Build and push
  uses: docker/build-push-action@v6
  with:
    context: .
    push: true
    tags: ${{ secrets.DOCKERHUB_USERNAME }}/hyperswitch-router:gobibuy
    # 'gha' cache is the key here. It saves the cargo dependencies 
    # so only your connector changes get recompiled.
    cache-from: type=gha
    cache-to: type=gha,mode=max 
    build-args: |
      RUSTFLAGS=-C link-arg=-fuse-ld=mold