name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # We set this to 4 hours because Swap builds are slower
    timeout-minutes: 240 
    
    steps:
      - uses: actions/checkout@v4

      - name: Maximize Build Space & Create Swap
        run: |
          # 1. Clear out pre-installed software
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          
          # 2. Disable existing swap and remove the file if it exists
          sudo swapoff -a || true
          sudo rm -f /swapfile
          
          # 3. Create the new 16GB Swap file
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Note: No 'platforms' flag needed if your VPS is standard Intel/AMD
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hyperswitch-router:gobibuy
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            RUSTFLAGS=-C link-arg=-fuse-ld=mold