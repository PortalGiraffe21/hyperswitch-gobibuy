name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Maximize Build Space & Create Swap
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android /usr/share/swift \
            /usr/local/share/chromium /usr/share/miniconda
          sudo apt-get clean
          df -h

          sudo swapoff -a || true
          sudo rm -f /swapfile
          sudo fallocate -l 24G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hyperswitch-router:gobibuy
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            RUSTFLAGS=-C link-arg=-fuse-ld=mold